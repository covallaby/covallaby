# Fly.io deploy template. Copy to the repo root (or `fly launch --copy-config`)
# then `fly deploy`. A 256MB machine is plenty; add a volume for the SQLite file.
app = "covallaby"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  COVALLABY_HOSTED = "1"
  COVALLABY_BASE_URL = "https://app.covallaby.com"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1 # never scale to zero — cold starts caused bugs

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

# Storage is Managed Postgres (DATABASE_URL secret, set via `fly mpg attach`);
# no volume needed. Uploads authenticate with the COVALLABY_TOKEN secret.
