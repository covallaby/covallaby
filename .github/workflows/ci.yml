name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: covallaby
          POSTGRES_PASSWORD: covallaby
          POSTGRES_DB: covallaby
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U covallaby"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test (SQLite + Postgres)
        run: pnpm test
        env:
          TEST_DATABASE_URL: postgres://covallaby:covallaby@localhost:5432/covallaby

      - name: Docker image builds
        run: docker build -t covallaby-server .
